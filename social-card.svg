<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent Hygiene Linter social card</title>
  <desc id="desc">A dark terminal-style card for the repo hygiene scorer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="glow" x1="120" y1="96" x2="600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="80" x2="440" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="48" fill="url(#bg)" />
  <rect x="56" y="56" width="1088" height="518" rx="34" fill="#0b1120" stroke="#1f2937" stroke-width="2" />
  <path d="M0 0h1200v630H0z" fill="url(#glow)" />
  <!-- logo icon -->
  <g transform="translate(88 96)">
    <rect width="132" height="132" rx="32" fill="#111827" stroke="#334155" stroke-width="4" />
    <!-- clipboard -->
    <rect x="28" y="20" width="76" height="92" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="3" />
    <rect x="46" y="12" width="40" height="18" rx="6" fill="#111827" stroke="#38bdf8" stroke-width="3" />
    <!-- check 1 -->
    <path d="M40 54 l8 8 l14-14" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="72" y1="60" x2="96" y2="60" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <!-- check 2 -->
    <path d="M40 80 l8 8 l14-14" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="72" y1="86" x2="96" y2="86" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
    <!-- warning 3 -->
    <path d="M48 104 l-8 0 l4-8 z" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linejoin="round"/>
    <line x1="58" y1="104" x2="76" y2="104" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="256" y="162" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">agent-hygiene-linter</text>
  <text x="256" y="214" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26">Score your repo hygiene in one command.</text>
  <!-- terminal block -->
  <g transform="translate(256 270)">
    <rect width="440" height="66" rx="18" fill="#111827" stroke="#334155" stroke-width="2" />
    <text x="24" y="42" fill="#67e8f9" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24">npx agent-hygiene-linter .</text>
  </g>
  <!-- feature bullets -->
  <g transform="translate(256 366)" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">
    <text x="0" y="0">• README · AGENTS.md · docs · changelog</text>
    <text x="0" y="36">• npm script coverage · conventional commits</text>
    <text x="0" y="72">• text / markdown / JSON output · --min-score CI gate</text>
  </g>
  <!-- score panel -->
  <g transform="translate(804 120)">
    <rect width="312" height="370" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2" />
    <text x="28" y="50" fill="#94a3b8" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">Agent hygiene score:</text>
    <text x="28" y="100" fill="#34d399" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="54" font-weight="800">92/100</text>
    <path d="M28 132h256" stroke="#1f2937" stroke-width="2" />
    <text x="28" y="170" fill="#34d399" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">[good] README exists</text>
    <text x="28" y="200" fill="#34d399" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">[good] Agent instructions exist</text>
    <text x="28" y="230" fill="#34d399" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">[good] Commit style consistent</text>
    <text x="28" y="260" fill="#34d399" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">[good] Scripts predictable</text>
    <text x="28" y="290" fill="#f59e0b" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">[warn] Docs dir is thin</text>
    <path d="M28 316h256" stroke="#1f2937" stroke-width="2" />
    <text x="28" y="350" fill="#67e8f9" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">Good: 6 · Warning: 1 · Fix now: 0</text>
  </g>
</svg>
